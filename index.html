<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HealthFirst Medical Center | Dr. James Mitchell, MD</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    :root {
      --primary:#0a6e8a; --primary-dark:#084f65; --primary-light:#e0f4f8;
      --accent:#2abf9e; --accent-dark:#1e9e82; --gold:#c9a84c;
      --text-dark:#1a2535; --text-mid:#4a5568; --text-light:#718096;
      --bg-white:#ffffff; --bg-light:#f7fafc; --bg-section:#eef6f9;
      --border:#e2e8f0;
      --shadow-sm:0 2px 8px rgba(0,0,0,.06);
      --shadow-md:0 8px 24px rgba(0,0,0,.10);
      --shadow-lg:0 20px 48px rgba(0,0,0,.14);
      --radius-sm:8px; --radius-md:14px; --radius-lg:24px;
      --transition:all .3s cubic-bezier(.4,0,.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Inter',sans-serif;color:var(--text-dark);background:var(--bg-white);overflow-x:hidden}
    a{text-decoration:none;color:inherit}
    ul{list-style:none}
    .container{max-width:1200px;margin:0 auto;padding:0 24px}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:99px;font-size:.9rem;font-weight:600;cursor:pointer;border:none;transition:var(--transition);font-family:'Inter',sans-serif}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{background:var(--primary-dark);transform:translateY(-2px);box-shadow:0 8px 20px rgba(10,110,138,.35)}
    .btn-accent{background:var(--accent);color:#fff}
    .btn-accent:hover{background:var(--accent-dark);transform:translateY(-2px)}
    .btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary)}
    .btn-outline:hover{background:var(--primary);color:#fff;transform:translateY(-2px)}
    .btn-white{background:#fff;color:var(--primary)}
    .btn-white:hover{background:var(--primary-light);transform:translateY(-2px)}
    .section-label{display:inline-block;font-size:.75rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:rgba(42,191,158,.1);padding:4px 14px;border-radius:99px;margin-bottom:12px}
    .section-title{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,3vw,2.6rem);font-weight:700;color:var(--text-dark);line-height:1.25;margin-bottom:16px}
    .section-sub{font-size:1rem;color:var(--text-mid);line-height:1.7;max-width:560px}

    /* TOPBAR */
    .topbar{background:var(--primary-dark);color:rgba(255,255,255,.85);font-size:.8rem;padding:8px 0}
    .topbar .container{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
    .topbar-left,.topbar-right{display:flex;align-items:center;gap:20px}
    .topbar-item{display:flex;align-items:center;gap:6px}
    .topbar-item i{color:var(--accent)}
    .topbar-right a{color:rgba(255,255,255,.85);transition:var(--transition)}
    .topbar-right a:hover{color:var(--accent)}

    /* NAVBAR */
    .navbar{position:sticky;top:0;z-index:1000;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm)}
    .navbar .container{display:flex;align-items:center;justify-content:space-between;height:72px}
    .logo{display:flex;align-items:center;gap:12px}
    .logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem}
    .logo-text .name{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;line-height:1.1}
    .logo-text .tagline{font-size:.7rem;color:var(--text-light);letter-spacing:.08em;text-transform:uppercase}
    .nav-links{display:flex;align-items:center;gap:4px}
    .nav-links a{padding:8px 14px;border-radius:var(--radius-sm);font-size:.88rem;font-weight:500;color:var(--text-mid);transition:var(--transition)}
    .nav-links a:hover{color:var(--primary);background:var(--primary-light)}
    .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;background:none;border:none}
    .hamburger span{display:block;width:24px;height:2px;background:var(--text-dark);border-radius:2px;transition:var(--transition)}
    .mobile-menu{display:none;flex-direction:column;background:#fff;padding:16px 24px 24px;border-bottom:1px solid var(--border);gap:4px}
    .mobile-menu.open{display:flex}
    .mobile-menu a{padding:12px 16px;border-radius:var(--radius-sm);font-weight:500;color:var(--text-mid);transition:var(--transition)}
    .mobile-menu a:hover{color:var(--primary);background:var(--primary-light)}

    /* HERO */
    .hero{position:relative;min-height:92vh;display:flex;align-items:center;background:linear-gradient(135deg,#051e2c 0%,#0a6e8a 55%,#0d8fa6 100%);overflow:hidden}
    .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 15% 25%,rgba(42,191,158,.2) 0%,transparent 50%),radial-gradient(circle at 85% 75%,rgba(10,110,138,.3) 0%,transparent 50%)}
    .hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:60px 60px}
    .hero .container{position:relative;z-index:2;display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center;padding-top:60px;padding-bottom:60px}
    .hero-content{color:#fff}
    .hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(8px);padding:8px 16px;border-radius:99px;font-size:.78rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.9);margin-bottom:24px}
    .pulse-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
    .hero-title{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,4.5vw,3.6rem);font-weight:700;line-height:1.15;margin-bottom:20px}
    .hero-title span{color:var(--accent)}
    .hero-desc{font-size:1.05rem;line-height:1.75;color:rgba(255,255,255,.8);margin-bottom:36px;max-width:500px}
    .hero-actions{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:48px}
    .hero-stats{display:flex;gap:32px;padding-top:32px;border-top:1px solid rgba(255,255,255,.15)}
    .hero-stat .num{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:700;color:#fff;line-height:1}
    .hero-stat .lbl{font-size:.75rem;color:rgba(255,255,255,.6);margin-top:4px}
    .hero-card{background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:var(--radius-lg);padding:32px;color:#fff;position:relative}
    .doc-profile{display:flex;align-items:center;gap:16px;margin-bottom:24px}
    .doc-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--primary));display:flex;align-items:center;justify-content:center;font-size:1.8rem;color:#fff;border:3px solid rgba(255,255,255,.3);flex-shrink:0}
    .doc-name{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700}
    .doc-title-text{font-size:.82rem;color:rgba(255,255,255,.7);margin-top:2px}
    .stars{color:var(--gold);font-size:.82rem;margin-top:6px}
    .stars span{color:rgba(255,255,255,.6);font-size:.75rem;margin-left:4px}
    .card-hr{border:none;border-top:1px solid rgba(255,255,255,.12);margin:20px 0}
    .quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
    .qi{background:rgba(255,255,255,.08);border-radius:var(--radius-sm);padding:14px}
    .qi i{color:var(--accent);margin-bottom:6px;display:block;font-size:.85rem}
    .qi .ql{font-size:.7rem;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.08em}
    .qi .qv{font-size:.88rem;font-weight:600;margin-top:2px}
    .avail-bar{background:rgba(42,191,158,.15);border:1px solid rgba(42,191,158,.3);border-radius:var(--radius-sm);padding:14px 16px;display:flex;align-items:center;gap:10px;font-size:.85rem}
    .avail-dot{width:10px;height:10px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
    .float-card{position:absolute;background:#fff;border-radius:var(--radius-md);padding:12px 16px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;font-size:.82rem}
    .float-card.tl{top:-18px;left:-24px}
    .float-card.br{bottom:-18px;right:-24px}
    .fc-icon{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
    .fc-icon.g{background:rgba(42,191,158,.15);color:var(--accent)}
    .fc-icon.b{background:rgba(10,110,138,.15);color:var(--primary)}
    .fc-num{font-weight:700;color:var(--text-dark)}
    .fc-sub{color:var(--text-light);font-size:.72rem}

    /* TRUST BAR */
    .trust-bar{background:var(--bg-light);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:18px 0;overflow:hidden}
    .marquee-track{display:flex;gap:48px;animation:marquee 24s linear infinite;width:max-content}
    @keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    .marquee-item{display:flex;align-items:center;gap:10px;white-space:nowrap;font-size:.8rem;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:.08em}
    .marquee-item i{color:var(--accent)}

    /* SERVICES */
    .services{padding:100px 0}
    .services-header{text-align:center;margin-bottom:60px}
    .services-header .section-sub{margin:0 auto}
    .services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px}
    .service-card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-md);padding:32px 28px;transition:var(--transition);position:relative;overflow:hidden;cursor:pointer}
    .service-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--accent));transform:scaleX(0);transition:var(--transition)}
    .service-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg);border-color:transparent}
    .service-card:hover::before{transform:scaleX(1)}
    .svc-icon{width:56px;height:56px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-bottom:20px;transition:var(--transition)}
    .service-card:hover .svc-icon{transform:scale(1.1)}
    .si-blue{background:rgba(10,110,138,.1);color:var(--primary)}
    .si-green{background:rgba(42,191,158,.1);color:var(--accent)}
    .si-purple{background:rgba(99,102,241,.1);color:#6366f1}
    .si-orange{background:rgba(249,115,22,.1);color:#f97316}
    .si-pink{background:rgba(236,72,153,.1);color:#ec4899}
    .si-teal{background:rgba(20,184,166,.1);color:#14b8a6}
    .service-card h3{font-size:1.05rem;font-weight:700;margin-bottom:10px}
    .service-card p{font-size:.88rem;color:var(--text-mid);line-height:1.65;margin-bottom:20px}
    .svc-link{font-size:.82rem;font-weight:600;color:var(--primary);display:flex;align-items:center;gap:6px;transition:var(--transition)}
    .service-card:hover .svc-link{gap:10px}

    /* ABOUT */
    .about{padding:100px 0;background:var(--bg-section)}
    .about .container{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
    .about-visual{position:relative}
    .about-img-wrap{background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:var(--radius-lg);padding:4px}
    .about-img-inner{background:linear-gradient(145deg,#c8edf5,#e0f4f8);border-radius:calc(var(--radius-lg) - 4px);height:460px;display:flex;align-items:center;justify-content:center}
    .doc-illo{font-size:9rem;opacity:.5}
    .about-stat-card{position:absolute;bottom:-20px;right:-20px;background:#fff;border-radius:var(--radius-md);padding:20px 24px;box-shadow:var(--shadow-lg);text-align:center;min-width:140px}
    .asc-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--primary);line-height:1}
    .asc-lbl{font-size:.78rem;color:var(--text-light);margin-top:4px}
    .cert-stack{position:absolute;top:-16px;left:-16px;display:flex;flex-direction:column;gap:8px}
    .cert-pill{background:#fff;border-radius:99px;padding:8px 14px;font-size:.72rem;font-weight:600;color:var(--primary);box-shadow:var(--shadow-md);display:flex;align-items:center;gap:6px}
    .cert-pill i{color:var(--gold)}
    .credentials{display:flex;flex-wrap:wrap;gap:10px;margin:24px 0 28px}
    .cred-tag{display:flex;align-items:center;gap:6px;background:var(--primary-light);color:var(--primary);border-radius:99px;padding:6px 14px;font-size:.78rem;font-weight:600}
    .about-text{font-size:.95rem;color:var(--text-mid);line-height:1.75;margin-bottom:14px}
    .skill-row{margin-bottom:16px}
    .skill-header{display:flex;justify-content:space-between;font-size:.82rem;font-weight:600;margin-bottom:6px}
    .skill-bar{height:6px;background:var(--border);border-radius:99px;overflow:hidden}
    .skill-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:99px;transition:width 1.5s ease}
    .about-actions{display:flex;gap:14px;flex-wrap:wrap;margin-top:32px}

    /* WHY US */
    .whyus{padding:100px 0}
    .whyus .container{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
    .features-list{display:flex;flex-direction:column;gap:20px;margin-top:32px}
    .feat-item{display:flex;gap:18px;align-items:flex-start;padding:20px;border-radius:var(--radius-md);border:1px solid var(--border);transition:var(--transition)}
    .feat-item:hover{border-color:var(--accent);box-shadow:var(--shadow-md);transform:translateX(6px)}
    .feat-ico{width:48px;height:48px;flex-shrink:0;background:var(--primary-light);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--primary);font-size:1rem}
    .feat-item h4{font-size:.95rem;font-weight:700;margin-bottom:4px}
    .feat-item p{font-size:.85rem;color:var(--text-mid);line-height:1.6}
    .stats-mosaic{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .mosaic-card{background:var(--bg-section);border-radius:var(--radius-md);padding:28px 24px;border:1px solid var(--border);transition:var(--transition)}
    .mosaic-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md)}
    .mosaic-card:nth-child(2),.mosaic-card:nth-child(4){margin-top:28px}
    .mc-icon{font-size:1.5rem;margin-bottom:12px}
    .mc-num{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;color:var(--primary);line-height:1;margin-bottom:6px}
    .mc-lbl{font-size:.82rem;color:var(--text-mid);font-weight:500}

    /* TESTIMONIALS */
    .testimonials{padding:100px 0;background:var(--bg-section)}
    .testimonials-header{text-align:center;margin-bottom:60px}
    .testimonials-header .section-sub{margin:0 auto}
    .testi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px}
    .testi-card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-md);padding:32px;transition:var(--transition);position:relative}
    .testi-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
    .testi-quote{font-size:3rem;color:var(--primary-light);line-height:1;font-family:serif;position:absolute;top:20px;right:24px}
    .testi-stars{color:var(--gold);font-size:.85rem;margin-bottom:16px}
    .testi-text{font-size:.92rem;color:var(--text-mid);line-height:1.7;margin-bottom:24px;font-style:italic}
    .testi-author{display:flex;align-items:center;gap:12px}
    .testi-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;color:#fff;flex-shrink:0}
    .ta-blue{background:linear-gradient(135deg,var(--primary),var(--accent))}
    .ta-green{background:linear-gradient(135deg,var(--accent),#0d8fa6)}
    .ta-purple{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
    .testi-name{font-size:.9rem;font-weight:700}
    .testi-meta{font-size:.75rem;color:var(--text-light)}

    /* APPOINTMENT */
    .appointment{padding:100px 0}
    .appointment .container{display:grid;grid-template-columns:1fr 1.2fr;gap:64px;align-items:start}
    .appt-info .section-sub{margin-bottom:32px}
    .contact-list{display:flex;flex-direction:column;gap:14px}
    .contact-item{display:flex;gap:16px;align-items:center;padding:16px;background:var(--bg-light);border:1px solid var(--border);border-radius:var(--radius-md)}
    .c-icon{width:44px;height:44px;background:var(--primary-light);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--primary);font-size:.95rem;flex-shrink:0}
    .c-lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-light);font-weight:600;margin-bottom:2px}
    .c-val{font-size:.9rem;font-weight:600}
    .appt-form-wrap{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px;box-shadow:var(--shadow-md)}
    .form-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;margin-bottom:6px}
    .form-sub{font-size:.85rem;color:var(--text-light);margin-bottom:28px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .form-group{display:flex;flex-direction:column;gap:6px}
    .form-group.full{grid-column:1 / -1}
    .form-group label{font-size:.8rem;font-weight:600;color:var(--text-dark)}
    .form-group input,.form-group select,.form-group textarea{padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.88rem;font-family:'Inter',sans-serif;color:var(--text-dark);background:var(--bg-white);transition:var(--transition);outline:none}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(10,110,138,.1)}
    .form-group textarea{resize:vertical;min-height:100px}
    .form-submit{width:100%;margin-top:8px;justify-content:center;font-size:1rem;padding:16px}
    .form-note{text-align:center;font-size:.75rem;color:var(--text-light);margin-top:12px}
    .form-note i{color:var(--accent);margin-right:4px}
    .success-msg{display:none;text-align:center;padding:32px}
    .success-msg.show{display:block}
    .success-icon{width:64px;height:64px;background:rgba(42,191,158,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.5rem;color:var(--accent)}

    /* CTA BANNER */
    .cta-banner{padding:80px 0;background:linear-gradient(135deg,var(--primary-dark) 0%,var(--primary) 50%,#0d8fa6 100%);position:relative;overflow:hidden}
    .cta-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 50%,rgba(42,191,158,.2) 0%,transparent 60%)}
    .cta-inner{position:relative;z-index:1;text-align:center;color:#fff}
    .cta-inner .section-label{background:rgba(255,255,255,.15);color:#fff}
    .cta-title{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,3vw,2.8rem);font-weight:700;margin-bottom:16px}
    .cta-sub{font-size:1rem;color:rgba(255,255,255,.8);margin-bottom:36px;max-width:520px;margin-left:auto;margin-right:auto}
    .cta-actions{display:flex;justify-content:center;gap:16px;flex-wrap:wrap}
    .cta-phone{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.9);font-size:.9rem;font-weight:600;margin-top:20px;justify-content:center}
    .cta-phone i{color:var(--accent)}

    /* FOOTER */
    .footer{background:var(--text-dark);color:rgba(255,255,255,.75);padding:60px 0 0}
    .footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;margin-bottom:48px}
    .footer-brand .logo-text .name{color:#fff}
    .footer-brand .logo-text .tagline{color:rgba(255,255,255,.4)}
    .footer-desc{font-size:.88rem;line-height:1.7;color:rgba(255,255,255,.6);margin:16px 0 24px}
    .social-links{display:flex;gap:10px}
    .social-btn{width:36px;height:36px;border-radius:var(--radius-sm);background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.7);font-size:.85rem;transition:var(--transition)}
    .social-btn:hover{background:var(--accent);color:#fff;transform:translateY(-2px)}
    .footer-col h4{font-size:.85rem;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.08
